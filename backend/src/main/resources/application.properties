spring.application.name=backend
server.port=8080

# ===== Database Configuration =====
# 1. Ensure the name matches in Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/smart-campushub-db?createDatabaseIfNotExist=true
spring.datasource.username=root

# 2. MYSQL PASSWORD HERE
spring.datasource.password=Senu*2000

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate Settings =====
# 'update' means Hibernate will create your tables automatically on start
spring.jpa.hibernate.ddl-auto=update
# 'true' lets you see the SQL in the console—great for debugging!
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Error Handling =====
# This ensures that validation errors are sent back to the frontend
spring.web.error.include-message=always

